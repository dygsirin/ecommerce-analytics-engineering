version: 2

models:
  - name: fact_order_items
    description: >
      Fact table at order-item grain.
      Each row represents a purchased product within an order.

    columns:

      - name: order_item_id
        description: Unique identifier of an order item. Primary key of the fact table.
        tests:
          - unique
          - not_null

      - name: order_id
        description: Identifier of the parent order.

      - name: customer_id
        description: Customer who placed the order.

      - name: product_id
        description: Identifier of the purchased product.

      - name: sale_price
        description: Revenue generated by the purchased item.

      - name: status
        description: Fulfillment status.

      - name: is_returned
        description: Indicator whether the item was returned.

      - name: is_cancelled
        description: Indicator whether the item was cancelled.

      - name: is_shipped
        description: Indicator whether the item was shipped.

      - name: is_completed
        description: Indicator whether the item was completed.

      - name: created_at
        description: Timestamp when the order was created.

      - name: shipped_at
        description: Timestamp when the order item was shipped.

      - name: delivered_at
        description: Timestamp when the order item was delivered.

      - name: returned_at
        description: Timestamp when the order item was returned.